<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VE — Earnings Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f; --surface: #141418; --surface2: #1c1c22; --border: #2a2a32;
    --gold: #f5a623; --gold-dim: #c47d0e; --gold-glow: rgba(245,166,35,0.15);
    --green: #22c55e; --red: #ef4444; --blue: #60a5fa; --purple: #a78bfa;
    --amber: #fbbf24; --teal: #2dd4bf; --muted: #6b7280; --text: #e5e7eb; --text2: #9ca3af;
    --sidebar-w: 220px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }
  .app { display: flex; min-height: 100vh; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0;
    position: sticky; top: 0; height: 100vh; overflow-y: auto; overflow-x: hidden;
    transition: width 0.22s cubic-bezier(0.4,0,0.2,1);
  }
  .sidebar.collapsed { width: 56px; }

  .sidebar-logo {
    padding: 16px 14px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-shrink: 0;
  }
  .sidebar-logo-text { overflow: hidden; white-space: nowrap; transition: opacity 0.15s, width 0.15s; }
  .sidebar.collapsed .sidebar-logo-text { opacity: 0; width: 0; pointer-events: none; }
  .sidebar-logo .suite { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--gold); }
  .sidebar-logo .sub { font-size: 10px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-top: 2px; }

  .sidebar-toggle {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    color: var(--muted); cursor: pointer; padding: 5px 7px; font-size: 14px; line-height: 1;
    flex-shrink: 0; transition: color 0.15s, border-color 0.15s;
  }
  .sidebar-toggle:hover { color: var(--gold); border-color: rgba(245,166,35,0.4); }

  .sidebar-section {
    padding: 16px 12px 8px; font-size: 10px; letter-spacing: 2px;
    color: var(--muted); text-transform: uppercase; white-space: nowrap;
    overflow: hidden; transition: opacity 0.15s;
  }
  .sidebar.collapsed .sidebar-section { opacity: 0; height: 0; padding: 0; }

  .nav-item {
    margin: 2px 8px; padding: 10px 10px; border-radius: 8px; cursor: pointer;
    font-size: 13px; font-weight: 500; color: var(--text2);
    display: flex; align-items: center; gap: 10px;
    transition: all 0.15s; border: 1px solid transparent; white-space: nowrap; overflow: hidden;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--gold-glow); color: var(--gold); border-color: rgba(245,166,35,0.25); }
  .nav-item .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .nav-item-label { overflow: hidden; white-space: nowrap; transition: opacity 0.15s, max-width 0.15s; max-width: 200px; }
  .sidebar.collapsed .nav-item-label { opacity: 0; max-width: 0; }
  .nav-count {
    margin-left: auto; font-size: 11px; background: var(--surface2);
    padding: 2px 6px; border-radius: 10px; color: var(--muted);
    transition: opacity 0.15s; flex-shrink: 0;
  }
  .sidebar.collapsed .nav-count { opacity: 0; width: 0; padding: 0; overflow: hidden; }
  .nav-item.active .nav-count { background: rgba(245,166,35,0.2); color: var(--gold); }

  .sidebar-bottom { margin-top: auto; padding: 16px; border-top: 1px solid var(--border); overflow: hidden; }
  .sidebar.collapsed .sidebar-bottom { padding: 10px 8px; }
  .refresh-btn {
    width: 100%; padding: 9px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text2); font-size: 12px; cursor: pointer;
    font-family: 'Inter', sans-serif; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 6px; white-space: nowrap;
  }
  .refresh-btn:hover { color: var(--gold); border-color: rgba(245,166,35,0.3); }
  .refresh-btn-label { transition: opacity 0.15s, max-width 0.15s; max-width: 200px; overflow: hidden; }
  .sidebar.collapsed .refresh-btn-label { opacity: 0; max-width: 0; }
  .last-updated { font-size: 10px; color: var(--muted); text-align: center; margin-top: 8px; transition: opacity 0.15s; white-space: nowrap; overflow: hidden; }
  .sidebar.collapsed .last-updated { opacity: 0; height: 0; margin: 0; }

  /* ── MAIN ── */
  .main { flex: 1; overflow-y: auto; min-width: 0; }

  /* ── HEADER ── */
  .page-header {
    padding: 32px 40px 0; display: flex; align-items: flex-start;
    justify-content: space-between; gap: 20px; flex-wrap: wrap;
  }
  .page-title { font-size: 13px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  .client-name { font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 2px; color: var(--text); line-height: 1; }
  .client-name span { color: var(--gold); }

  /* ── EDITOR FILTER ── */
  .editor-filter { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 8px; }
  .filter-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .editor-btn {
    padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--text2); font-size: 12px;
    font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.15s; font-weight: 500;
  }
  .editor-btn:hover { border-color: var(--gold); color: var(--gold); }
  .editor-btn.active { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 600; }

  /* ── STATS ROW ── */
  .stats-row { display: flex; gap: 16px; padding: 28px 40px 0; flex-wrap: wrap; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px 24px; flex: 1; min-width: 140px;
    position: relative; overflow: hidden;
  }
  .stat-card.clickable { cursor: pointer; transition: transform 0.15s, border-color 0.15s; }
  .stat-card.clickable:hover { transform: translateY(-2px); border-color: var(--text2); }
  .stat-card.earnings { border-color: rgba(245,166,35,0.35); }
  .stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 2px; background: var(--border); border-radius: 12px 12px 0 0;
  }
  .stat-card.earnings::before   { background: linear-gradient(90deg, var(--gold), transparent); }
  .stat-card.paid::before       { background: linear-gradient(90deg, var(--green), transparent); }
  .stat-card.unpaid::before     { background: linear-gradient(90deg, var(--red), transparent); }
  .stat-card.total::before      { background: linear-gradient(90deg, var(--blue), transparent); }
  .stat-card.pending-card::before  { background: linear-gradient(90deg, var(--purple), transparent); }
  .stat-card.checking-card::before { background: linear-gradient(90deg, var(--amber), transparent); }
  .stat-card.exported-card::before { background: linear-gradient(90deg, var(--teal), transparent); }
  .stat-label { font-size: 11px; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 1px; line-height: 1; }
  .stat-card.earnings .stat-value  { color: var(--gold); font-size: 44px; }
  .stat-card.paid .stat-value      { color: var(--green); }
  .stat-card.unpaid .stat-value    { color: var(--red); }
  .stat-card.total .stat-value     { color: var(--blue); }
  .stat-card.pending-card .stat-value  { color: var(--purple); }
  .stat-card.checking-card .stat-value { color: var(--amber); }
  .stat-card.exported-card .stat-value { color: var(--teal); }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 6px; }

  /* ── HERO ── */
  .hero { padding: 48px 40px 0; text-align: center; }
  .hero-eyebrow { font-size: 11px; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; margin-bottom: 16px; }
  .hero-earnings { font-family: 'Bebas Neue', sans-serif; font-size: clamp(80px, 15vw, 160px); letter-spacing: 4px; color: var(--gold); line-height: 1; }
  .hero-currency { font-size: 0.4em; vertical-align: top; margin-top: 0.18em; color: var(--gold-dim); }
  .hero-sub { font-size: 14px; color: var(--muted); margin-top: 12px; letter-spacing: 1px; }
  .hero-breakdown { display: flex; justify-content: center; gap: 40px; margin-top: 40px; flex-wrap: wrap; }
  .hero-stat { text-align: center; }
  .hero-stat.clickable { cursor: pointer; }
  .hero-stat.clickable:hover .hero-stat-val { opacity: 0.8; }
  .hero-stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--text); }
  .hero-stat-val.g { color: var(--green); }
  .hero-stat-val.r { color: var(--red); }
  .hero-stat-val.p { color: var(--purple); }
  .hero-stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 2px; }
  .hero-divider { width: 1px; background: var(--border); align-self: stretch; }
  .editor-earnings { display: flex; justify-content: center; gap: 24px; margin-top: 32px; flex-wrap: wrap; }
  .editor-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 32px; text-align: center; min-width: 180px; }
  .editor-card-name { font-size: 12px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 2px; }
  .editor-card-fullname { font-size: 10px; color: var(--gold); margin-bottom: 8px; opacity: 0.85; }
  .editor-card-amt { font-family: 'Bebas Neue', sans-serif; font-size: 38px; color: var(--text); }
  .editor-card-amt .peso { font-size: 0.5em; color: var(--muted); vertical-align: top; margin-top: 0.2em; }

  /* ── STATUS LEGEND ── */
  .status-legend { display: flex; gap: 16px; flex-wrap: wrap; padding: 20px 40px 0; align-items: center; }
  .legend-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* ── TABLE ── */
  .table-section { padding: 28px 40px 40px; }
  .table-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .table-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 1.5px; }
  .table-count { font-size: 12px; color: var(--muted); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px 14px; font-size: 10px; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--border); font-weight: 500; }
  td { padding: 12px 14px; border-bottom: 1px solid rgba(42,42,50,0.5); color: var(--text2); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); color: var(--text); }
  .project-name { color: var(--text); font-weight: 500; font-size: 13px; }

  /* ── BADGES ── */
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; }
  .badge-paid     { background: rgba(34,197,94,0.12);  color: #22c55e; border: 1px solid rgba(34,197,94,0.2); }
  .badge-unpaid   { background: rgba(239,68,68,0.12);  color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
  .badge-exported { background: rgba(45,212,191,0.12); color: #2dd4bf; border: 1px solid rgba(45,212,191,0.2); }
  .badge-checking { background: rgba(251,191,36,0.12); color: #fbbf24; border: 1px solid rgba(251,191,36,0.2); }
  .badge-pending  { background: rgba(167,139,250,0.12);color: #a78bfa; border: 1px solid rgba(167,139,250,0.2); }

  .editor-tag { display: inline-block; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: help; }
  .editor-aus  { background: rgba(217,119,6,0.15);  color: #d97706; }
  .editor-neil { background: rgba(34,197,94,0.15);  color: #22c55e; }

  .amount { font-family: 'Bebas Neue', sans-serif; font-size: 15px; color: var(--text); letter-spacing: 0.5px; }
  .amount.earned { color: var(--green); }
  .amount.owed   { color: var(--red); }

  /* ── PER-PROJECT INLINE EDIT ── */
  .amount-cell { position: relative; display: inline-flex; align-items: center; gap: 5px; cursor: default; }
  .amount-cell .edit-hint {
    font-size: 9px; color: var(--muted); opacity: 0; transition: opacity 0.15s;
    letter-spacing: 0.5px; text-transform: uppercase; font-family: 'Inter', sans-serif;
  }
  td:hover .amount-cell .edit-hint { opacity: 1; }
  .amount-cell .edit-pencil {
    font-size: 11px; color: var(--muted); opacity: 0; transition: opacity 0.15s; cursor: pointer;
  }
  td:hover .amount-cell .edit-pencil { opacity: 0.7; }
  .amount-inline-input {
    font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 0.5px;
    background: var(--surface2); border: 1px solid var(--gold);
    border-radius: 5px; color: var(--gold); padding: 2px 8px;
    outline: none; width: 90px;
  }
  .amount-inline-input::-webkit-inner-spin-button,
  .amount-inline-input::-webkit-outer-spin-button { -webkit-appearance: none; }

  /* ── PRICING MANAGER ── */
  .pricing-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; padding: 28px 40px 40px; }
  .pricing-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px 24px; position: relative; overflow: hidden;
  }
  .pricing-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--gold), transparent); border-radius: 12px 12px 0 0; }
  .pricing-client { font-size: 11px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; }
  .pricing-input-row { display: flex; align-items: center; gap: 10px; }
  .pricing-symbol { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--gold-dim); line-height: 1; }
  .pricing-input {
    font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--gold);
    background: transparent; border: none; border-bottom: 2px solid var(--border);
    outline: none; width: 100%; letter-spacing: 1px; line-height: 1; padding-bottom: 4px;
    transition: border-color 0.15s;
  }
  .pricing-input:focus { border-color: var(--gold); }
  .pricing-input::-webkit-inner-spin-button,
  .pricing-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .pricing-hint { font-size: 11px; color: var(--muted); margin-top: 10px; }
  .pricing-save-bar { padding: 0 40px 32px; display: flex; align-items: center; gap: 16px; }
  .pricing-save-btn {
    padding: 10px 28px; background: var(--gold); color: #000; border: none;
    border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: opacity 0.15s;
  }
  .pricing-save-btn:hover { opacity: 0.88; }
  .pricing-saved-msg { font-size: 12px; color: var(--green); opacity: 0; transition: opacity 0.4s; }
  .pricing-saved-msg.show { opacity: 1; }
  .pricing-reset-btn {
    padding: 10px 20px; background: transparent; color: var(--muted); border: 1px solid var(--border);
    border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 12px;
    cursor: pointer; transition: all 0.15s; margin-left: auto;
  }
  .pricing-reset-btn:hover { color: var(--red); border-color: rgba(239,68,68,0.4); }

  /* ── MISC ── */
  .state-msg { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; gap: 16px; color: var(--muted); }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes countup { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .animate-in { animation: countup 0.6s cubic-bezier(0.22,1,0.36,1) both; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ═══════════════════════════════════════════════════════════════
     DESKTOP LEGACY RESPONSIVE (unchanged — exactly as original)
  ═══════════════════════════════════════════════════════════════ */
  @media (max-width: 700px) {
    .sidebar { width: 56px; }
    .sidebar-logo-text, .nav-item-label, .sidebar-section, .nav-count, .refresh-btn-label, .last-updated { display: none; }
    .page-header, .stats-row, .table-section, .hero, .status-legend, .pricing-grid, .pricing-save-bar { padding-left: 16px; padding-right: 16px; }
    .page-header { flex-direction: column; align-items: flex-start; gap: 16px; }
    .client-name { font-size: 32px; }
    .hero { padding-top: 32px; }
    .hero-earnings { font-size: clamp(56px, 18vw, 90px); }
    .hero-breakdown { gap: 16px; justify-content: center; }
    .hero-divider { display: none; }
    .hero-stat { min-width: 90px; }
    .hero-stat-val { font-size: 24px; }
    .stats-row { gap: 12px; }
    .stat-card { min-width: 100%; padding: 18px; }
    .stat-value { font-size: 30px; }
    .stat-card.earnings .stat-value { font-size: 36px; }
    .editor-earnings { gap: 12px; }
    .editor-card { width: 100%; min-width: unset; padding: 16px; }
    .editor-card-amt { font-size: 30px; }
    .status-legend { gap: 10px; }
    .legend-item { font-size: 11px; }
    .pricing-grid { grid-template-columns: 1fr; gap: 12px; }
    .pricing-save-bar { flex-direction: column; align-items: stretch; gap: 10px; }
    .pricing-save-btn, .pricing-reset-btn { width: 100%; }
    .pricing-reset-btn { margin-left: 0; }
    .table-section { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { min-width: 700px; }
    th, td { padding: 10px; white-space: nowrap; }
    .amount-inline-input { width: 70px; }
    .table-header { flex-direction: column; align-items: flex-start; gap: 6px; }
    .pricing-input { font-size: 28px; }
    .editor-filter { width: 100%; }
    .editor-btn { font-size: 11px; padding: 6px 10px; }
  }

  @media (max-width: 480px) {
    .client-name { font-size: 28px; }
    .hero-earnings { font-size: clamp(48px, 16vw, 72px); }
    .hero-stat-val { font-size: 20px; }
    .stat-card.earnings .stat-value { font-size: 32px; }
    .editor-card-amt { font-size: 26px; }
    .pricing-input { font-size: 24px; }
    .page-header, .stats-row, .table-section, .hero, .status-legend, .pricing-grid, .pricing-save-bar { padding-left: 12px; padding-right: 12px; }
  }

  /* ═══════════════════════════════════════════════════════════════
     MOBILE LAYOUT — activates at max-width: 768px
     Desktop (.app, .sidebar, .main) is completely hidden on mobile.
     A separate #mobile-root takes over.
  ═══════════════════════════════════════════════════════════════ */

  /* Hide mobile shell on desktop */
  #mobile-root { display: none; }

  @media (max-width: 768px) {
    /* Hide entire desktop app */
    .app { display: none !important; }

    /* Show mobile shell */
    #mobile-root { display: flex; flex-direction: column; min-height: 100vh; min-height: -webkit-fill-available; }

    /* ── MOBILE TOP BAR ── */
    .mob-topbar {
      position: sticky; top: 0; z-index: 100;
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      padding: 0 16px; height: 56px; flex-shrink: 0;
    }
    .mob-hamburger {
      width: 44px; height: 44px; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 5px; background: none; border: none; cursor: pointer;
      border-radius: 8px; flex-shrink: 0; transition: background 0.15s;
    }
    .mob-hamburger:active { background: var(--surface2); }
    .mob-hamburger span {
      display: block; width: 20px; height: 2px; background: var(--text2);
      border-radius: 2px; transition: all 0.2s;
    }
    .mob-logo {
      font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--gold);
      line-height: 1; flex-shrink: 0;
    }
    .mob-logo-dot { color: var(--text2); }
    .mob-page-title {
      flex: 1; font-size: 13px; font-weight: 600; color: var(--text2);
      text-transform: uppercase; letter-spacing: 1px; overflow: hidden;
      white-space: nowrap; text-overflow: ellipsis; text-align: right;
    }
    .mob-refresh-indicator {
      width: 8px; height: 8px; border-radius: 50%; background: var(--muted);
      flex-shrink: 0; transition: background 0.3s;
    }
    .mob-refresh-indicator.active { background: var(--gold); animation: pulse-dot 1s ease-in-out infinite; }
    .mob-refresh-indicator.done   { background: var(--green); }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── DRAWER OVERLAY ── */
    .mob-drawer-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.6); opacity: 0; pointer-events: none;
      transition: opacity 0.25s; backdrop-filter: blur(2px);
    }
    .mob-drawer-overlay.open { opacity: 1; pointer-events: all; }

    /* ── DRAWER PANEL ── */
    .mob-drawer {
      position: fixed; top: 0; left: 0; bottom: 0; z-index: 201;
      width: 280px; max-width: 85vw;
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      transform: translateX(-100%); transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
      will-change: transform;
    }
    .mob-drawer.open { transform: translateX(0); }

    .mob-drawer-header {
      padding: 20px 20px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .mob-drawer-logo { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; color: var(--gold); }
    .mob-drawer-logo-sub { font-size: 10px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-top: 2px; }
    .mob-drawer-close {
      width: 44px; height: 44px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--muted); font-size: 18px; cursor: pointer; line-height: 44px; text-align: center;
    }

    .mob-drawer-section {
      padding: 16px 20px 6px; font-size: 10px; letter-spacing: 2px;
      color: var(--muted); text-transform: uppercase;
    }
    .mob-drawer-nav { flex: 1; overflow-y: auto; padding: 0 12px; }

    .mob-nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 12px; border-radius: 10px; cursor: pointer;
      font-size: 14px; font-weight: 500; color: var(--text2);
      transition: all 0.15s; border: 1px solid transparent;
      min-height: 52px; margin: 2px 0;
    }
    .mob-nav-item:active { background: var(--surface2); }
    .mob-nav-item.active {
      background: var(--gold-glow); color: var(--gold);
      border-color: rgba(245,166,35,0.25);
    }
    .mob-nav-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .mob-nav-label { flex: 1; }
    .mob-nav-count {
      font-size: 12px; background: var(--surface2); padding: 2px 8px;
      border-radius: 10px; color: var(--muted);
    }
    .mob-nav-item.active .mob-nav-count { background: rgba(245,166,35,0.2); color: var(--gold); }

    .mob-drawer-bottom {
      padding: 16px; border-top: 1px solid var(--border); flex-shrink: 0;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
    }
    .mob-drawer-refresh {
      width: 100%; padding: 14px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text2); font-size: 14px; font-weight: 500;
      font-family: 'Inter', sans-serif; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all 0.15s; min-height: 52px;
    }
    .mob-drawer-refresh:active { border-color: var(--gold); color: var(--gold); }
    .mob-drawer-updated { font-size: 11px; color: var(--muted); text-align: center; margin-top: 8px; }

    /* ── MOBILE CONTENT AREA ── */
    .mob-content {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
      -webkit-overflow-scrolling: touch;
    }

    /* ── MOBILE EDITOR FILTER ── */
    .mob-editor-filter {
      padding: 12px 16px; display: flex; gap: 8px; align-items: center;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none; border-bottom: 1px solid var(--border);
    }
    .mob-editor-filter::-webkit-scrollbar { display: none; }
    .mob-filter-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0; }
    .mob-editor-btn {
      padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border);
      background: transparent; color: var(--text2); font-size: 13px; font-weight: 500;
      font-family: 'Inter', sans-serif; cursor: pointer; flex-shrink: 0;
      min-height: 44px; transition: all 0.15s; white-space: nowrap;
    }
    .mob-editor-btn.active { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 600; }

    /* ── MOBILE HERO ── */
    .mob-hero {
      padding: 28px 20px 24px; text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .mob-hero-eyebrow {
      font-size: 10px; letter-spacing: 3px; color: var(--muted);
      text-transform: uppercase; margin-bottom: 12px;
    }
    .mob-hero-amount {
      font-family: 'Bebas Neue', sans-serif; font-size: clamp(64px, 20vw, 96px);
      letter-spacing: 3px; color: var(--gold); line-height: 1;
    }
    .mob-hero-currency { font-size: 0.4em; vertical-align: top; margin-top: 0.2em; color: var(--gold-dim); }
    .mob-hero-sub { font-size: 13px; color: var(--muted); margin-top: 10px; }

    /* ── MOBILE STAT GRID ── */
    .mob-stat-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; padding: 20px 16px;
    }
    @media (max-width: 380px) {
      .mob-stat-grid { grid-template-columns: 1fr; }
    }
    .mob-stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px; position: relative; overflow: hidden;
    }
    .mob-stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 2px; border-radius: 12px 12px 0 0;
    }
    .mob-stat-card.ms-earnings { border-color: rgba(245,166,35,0.35); grid-column: 1/-1; }
    .mob-stat-card.ms-earnings::before { background: linear-gradient(90deg, var(--gold), transparent); }
    .mob-stat-card.ms-paid::before     { background: linear-gradient(90deg, var(--green), transparent); }
    .mob-stat-card.ms-unpaid::before   { background: linear-gradient(90deg, var(--red), transparent); }
    .mob-stat-card.ms-exported::before { background: linear-gradient(90deg, var(--teal), transparent); }
    .mob-stat-card.ms-checking::before { background: linear-gradient(90deg, var(--amber), transparent); }
    .mob-stat-card.ms-pending::before  { background: linear-gradient(90deg, var(--purple), transparent); }
    .mob-stat-card.ms-total::before    { background: linear-gradient(90deg, var(--blue), transparent); }
    .mob-stat-card.tap-active          { cursor: pointer; }
    .mob-stat-card.tap-active:active   { transform: scale(0.98); }

    .mob-stat-label { font-size: 10px; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
    .mob-stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 1px; line-height: 1; }
    .mob-stat-card.ms-earnings .mob-stat-value { font-size: 38px; color: var(--gold); }
    .mob-stat-card.ms-paid .mob-stat-value     { color: var(--green); }
    .mob-stat-card.ms-unpaid .mob-stat-value   { color: var(--red); }
    .mob-stat-card.ms-exported .mob-stat-value { color: var(--teal); }
    .mob-stat-card.ms-checking .mob-stat-value { color: var(--amber); }
    .mob-stat-card.ms-pending .mob-stat-value  { color: var(--purple); }
    .mob-stat-card.ms-total .mob-stat-value    { color: var(--blue); }
    .mob-stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .mob-tap-hint { font-size: 10px; color: var(--muted); margin-top: 6px; letter-spacing: 0.5px; }

    /* ── EDITOR CARDS (mobile) ── */
    .mob-editor-cards {
      padding: 0 16px 20px; display: flex; flex-direction: column; gap: 10px;
    }
    .mob-editor-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 18px 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .mob-editor-card-info { flex: 1; min-width: 0; }
    .mob-editor-card-tag { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; margin-bottom: 4px; }
    .mob-editor-card-full { font-size: 13px; color: var(--text); font-weight: 600; }
    .mob-editor-card-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .mob-editor-card-amt {
      font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--text); text-align: right;
      flex-shrink: 0;
    }
    .mob-editor-card-amt .mob-peso { font-size: 0.5em; color: var(--muted); vertical-align: top; margin-top: 0.25em; }

    /* ── STATUS LEGEND (mobile) ── */
    .mob-legend {
      padding: 16px 20px; border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 8px;
    }
    .mob-legend-title { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
    .mob-legend-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .mob-legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text2); }
    .mob-legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* ── MOBILE SECTION HEADER ── */
    .mob-section-header {
      padding: 20px 16px 12px; display: flex; align-items: baseline; justify-content: space-between;
    }
    .mob-section-title { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 1.5px; }
    .mob-section-count { font-size: 12px; color: var(--muted); }

    /* ── PROJECT CARDS (mobile client pages) ── */
    .mob-project-cards { padding: 0 16px 16px; display: flex; flex-direction: column; gap: 10px; }
    .mob-project-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px; position: relative; overflow: hidden;
    }
    .mob-project-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; border-radius: 12px 0 0 12px;
    }
    .mob-project-card.wf-exported::before { background: var(--teal); }
    .mob-project-card.wf-checking::before { background: var(--amber); }
    .mob-project-card.wf-pending::before  { background: var(--purple); }
    .mob-pc-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
    .mob-pc-name { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; min-width: 0; padding-right: 8px; line-height: 1.3; }
    .mob-pc-amount { font-family: 'Bebas Neue', sans-serif; font-size: 20px; flex-shrink: 0; }
    .mob-pc-amount.mob-earned { color: var(--green); }
    .mob-pc-amount.mob-owed   { color: var(--red); }
    .mob-pc-amount.mob-none   { color: var(--muted); font-size: 14px; }
    .mob-pc-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .mob-pc-date { font-size: 11px; color: var(--muted); }

    /* editable amount on mobile card */
    .mob-pc-amount-wrap { display: flex; align-items: center; gap: 4px; }
    .mob-pc-edit-btn {
      background: none; border: none; color: var(--muted); font-size: 13px;
      cursor: pointer; padding: 4px; line-height: 1; opacity: 0.6;
      min-width: 28px; min-height: 28px; display: flex; align-items: center; justify-content: center;
    }
    .mob-pc-edit-btn:active { opacity: 1; color: var(--gold); }
    .mob-amount-edit-input {
      font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 0.5px;
      background: var(--surface2); border: 1px solid var(--gold);
      border-radius: 6px; color: var(--gold); padding: 4px 10px;
      outline: none; width: 90px;
    }
    .mob-amount-edit-input::-webkit-inner-spin-button,
    .mob-amount-edit-input::-webkit-outer-spin-button { -webkit-appearance: none; }

    /* ── SUMMARY CARDS (mobile summary pages) ── */
    .mob-unpaid-total {
      margin: 16px 16px 0; padding: 16px;
      background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2);
      border-radius: 10px; display: flex; justify-content: space-between; align-items: center;
    }
    .mob-unpaid-total-label { font-size: 13px; color: var(--text2); }
    .mob-unpaid-total-amt { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--red); }
    .mob-summary-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px; position: relative; overflow: hidden;
    }
    .mob-summary-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; border-radius: 12px 0 0 12px;
    }
    .mob-summary-card.sc-pending::before  { background: var(--purple); }
    .mob-summary-card.sc-checking::before { background: var(--amber); }
    .mob-summary-card.sc-unpaid::before   { background: var(--red); }
    .mob-sc-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
    .mob-sc-client { font-size: 10px; letter-spacing: 2px; color: var(--gold); text-transform: uppercase; margin-bottom: 3px; }
    .mob-sc-name { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.3; }
    .mob-sc-amount { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--red); flex-shrink: 0; }
    .mob-sc-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .mob-sc-date { font-size: 11px; color: var(--muted); }

    /* ── MOBILE PRICING ── */
    .mob-pricing-cards { padding: 16px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 140px; }
    .mob-pricing-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px; position: relative; overflow: hidden;
    }
    .mob-pricing-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 2px; background: linear-gradient(90deg, var(--gold), transparent);
      border-radius: 12px 12px 0 0;
    }
    .mob-pricing-client { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 14px; }
    .mob-pricing-row { display: flex; align-items: center; gap: 10px; }
    .mob-pricing-symbol { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--gold-dim); }
    .mob-pricing-input {
      font-family: 'Bebas Neue', sans-serif; font-size: 40px; color: var(--gold);
      background: transparent; border: none; border-bottom: 2px solid var(--border);
      outline: none; width: 100%; letter-spacing: 1px; line-height: 1.1;
      padding-bottom: 4px; transition: border-color 0.15s; -webkit-appearance: none;
    }
    .mob-pricing-input:focus { border-color: var(--gold); }
    .mob-pricing-input::-webkit-inner-spin-button,
    .mob-pricing-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .mob-pricing-hint { font-size: 12px; color: var(--muted); margin-top: 10px; }

    /* Sticky save bar */
    .mob-pricing-sticky {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 90;
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      display: flex; flex-direction: column; gap: 8px;
    }
    .mob-pricing-save {
      padding: 15px; background: var(--gold); color: #000; border: none;
      border-radius: 10px; font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer; width: 100%; min-height: 52px;
    }
    .mob-pricing-future {
      padding: 13px; background: transparent; color: var(--text2); border: 1px solid var(--border);
      border-radius: 10px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500;
      cursor: pointer; width: 100%; min-height: 52px;
    }
    .mob-pricing-saved { font-size: 12px; color: var(--green); text-align: center; opacity: 0; transition: opacity 0.3s; height: 0; overflow: hidden; }
    .mob-pricing-saved.show { opacity: 1; height: auto; }

    /* ── MOBILE PAGE HEADER ── */
    .mob-page-header { padding: 20px 16px 0; }
    .mob-page-eyebrow { font-size: 11px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
    .mob-page-title-large {
      font-family: 'Bebas Neue', sans-serif; font-size: 34px; letter-spacing: 2px;
      color: var(--text); line-height: 1;
    }
    .mob-page-title-large span { color: var(--gold); }

    /* ── EMPTY STATE ── */
    .mob-empty {
      padding: 48px 20px; text-align: center; color: var(--muted); font-size: 14px;
    }

    /* ── CLIENT STAT ROW ── */
    .mob-client-stats {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 16px;
    }
    .mob-client-stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px; position: relative; overflow: hidden;
    }
    .mob-client-stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    }
    .mob-client-stat-card.mcs-earnings { grid-column: 1/-1; border-color: rgba(245,166,35,0.35); }
    .mob-client-stat-card.mcs-earnings::before { background: linear-gradient(90deg, var(--gold), transparent); }
    .mob-client-stat-card.mcs-unpaid::before   { background: linear-gradient(90deg, var(--red), transparent); }
    .mob-client-stat-card.mcs-exported::before { background: linear-gradient(90deg, var(--teal), transparent); }
    .mob-client-stat-card.mcs-checking::before { background: linear-gradient(90deg, var(--amber), transparent); }
    .mob-client-stat-card.mcs-pending::before  { background: linear-gradient(90deg, var(--purple), transparent); }
    .mob-csc-label { font-size: 10px; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
    .mob-csc-value { font-family: 'Bebas Neue', sans-serif; font-size: 28px; line-height: 1; }
    .mob-client-stat-card.mcs-earnings .mob-csc-value { color: var(--gold); font-size: 36px; }
    .mob-client-stat-card.mcs-unpaid .mob-csc-value   { color: var(--red); }
    .mob-client-stat-card.mcs-exported .mob-csc-value { color: var(--teal); }
    .mob-client-stat-card.mcs-checking .mob-csc-value { color: var(--amber); }
    .mob-client-stat-card.mcs-pending .mob-csc-value  { color: var(--purple); }
    .mob-csc-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* ── SMOOTH TRANSITIONS ── */
    .mob-content > div { animation: mob-fadein 0.2s ease both; }
    @keyframes mob-fadein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════
     DESKTOP APP (unchanged — hidden on mobile via CSS)
═══════════════════════════════════════════════════════════════════ -->
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-text">
        <div class="suite">V<span style="color:var(--text2)">E</span></div>
        <div class="sub">Earnings Tracker</div>
      </div>
      <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar">&#9776;</button>
    </div>
    <div class="sidebar-section">Overview</div>
    <div class="nav-item active" id="nav-home" onclick="switchTab('home')">
      <div class="dot" style="background:var(--gold)"></div>
      <span class="nav-item-label">Dashboard</span>
    </div>
    <div class="nav-item" id="nav-pricing" onclick="switchTab('pricing')">
      <div class="dot" style="background:var(--gold-dim)"></div>
      <span class="nav-item-label">Pricing Manager</span>
    </div>
    <div class="sidebar-section">Clients</div>
    <div id="client-nav"></div>
    <div class="sidebar-bottom">
      <button class="refresh-btn" onclick="loadData()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        <span class="refresh-btn-label">Refresh data</span>
      </button>
      <div class="last-updated" id="last-updated">–</div>
    </div>
  </aside>

  <main class="main" id="main-content">
    <div id="page-home"></div>
    <div id="page-client"  style="display:none"></div>
    <div id="page-summary" style="display:none"></div>
    <div id="page-pricing" style="display:none"></div>
  </main>
</div>

<!-- ═══════════════════════════════════════════════════════════════════
     MOBILE SHELL (shown only on ≤768px)
═══════════════════════════════════════════════════════════════════ -->
<div id="mobile-root">
  <!-- Top Bar -->
  <header class="mob-topbar">
    <button class="mob-hamburger" onclick="mobOpenDrawer()" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
    <div class="mob-logo">V<span class="mob-logo-dot">E</span></div>
    <div class="mob-page-title" id="mob-page-title">Dashboard</div>
    <div class="mob-refresh-indicator" id="mob-refresh-dot"></div>
  </header>

  <!-- Drawer overlay -->
  <div class="mob-drawer-overlay" id="mob-overlay" onclick="mobCloseDrawer()"></div>

  <!-- Drawer panel -->
  <nav class="mob-drawer" id="mob-drawer">
    <div class="mob-drawer-header">
      <div>
        <div class="mob-drawer-logo">V<span style="color:var(--text2)">E</span></div>
        <div class="mob-drawer-logo-sub">Earnings Tracker</div>
      </div>
      <button class="mob-drawer-close" onclick="mobCloseDrawer()">✕</button>
    </div>

    <div class="mob-drawer-nav">
      <div class="mob-drawer-section">Overview</div>
      <div class="mob-nav-item active" id="mob-nav-home" onclick="mobSwitchTab('home')">
        <div class="mob-nav-dot" style="background:var(--gold)"></div>
        <span class="mob-nav-label">Dashboard</span>
      </div>
      <div class="mob-nav-item" id="mob-nav-pricing" onclick="mobSwitchTab('pricing')">
        <div class="mob-nav-dot" style="background:var(--gold-dim)"></div>
        <span class="mob-nav-label">Pricing Manager</span>
      </div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// RATES
// ═══════════════════════════════════════════════════════════════════════════
const RATE_DEFAULTS = {
  'LHF': 500, 'Boney': 500, 'L&S': 500, 'Jeya': 500,
  'AM Market': 500, 'BullionFX': 500, 'Goreng Story': 500
};

let clientRates = {};
let futureClientRates = {};
let projectPriceSnapshots = {};

function loadRates() {
  try {
    const saved = localStorage.getItem('clientRates');
    clientRates = saved ? JSON.parse(saved) : { ...RATE_DEFAULTS };
    for (const [k, v] of Object.entries(RATE_DEFAULTS)) {
      if (clientRates[k] === undefined) clientRates[k] = v;
    }
    clientRates['BullionFX'] = 500;
  } catch (e) { clientRates = { ...RATE_DEFAULTS }; }
}

function saveRates() { localStorage.setItem('clientRates', JSON.stringify(clientRates)); }

function loadFutureRates() {
  try {
    const saved = localStorage.getItem('futureClientRates');
    futureClientRates = saved ? JSON.parse(saved) : { ...clientRates };
  } catch (e) { futureClientRates = { ...clientRates }; }
  for (const [k, v] of Object.entries(RATE_DEFAULTS)) {
    if (futureClientRates[k] === undefined) futureClientRates[k] = clientRates[k] ?? v;
  }
  futureClientRates['BullionFX'] = 500;
}

function saveFutureRates() { localStorage.setItem('futureClientRates', JSON.stringify(futureClientRates)); }

function loadProjectSnapshots() {
  try {
    const saved = localStorage.getItem('projectPriceSnapshots');
    projectPriceSnapshots = saved ? JSON.parse(saved) : {};
  } catch (e) { projectPriceSnapshots = {}; }
}

function saveProjectSnapshots() { localStorage.setItem('projectPriceSnapshots', JSON.stringify(projectPriceSnapshots)); }

function getRate(clientName) {
  return clientRates[clientName] !== undefined ? clientRates[clientName] : 500;
}

// ═══════════════════════════════════════════════════════════════════════════
// PROJECT OVERRIDES
// ═══════════════════════════════════════════════════════════════════════════
let projectOverrides = {};

function loadProjectOverrides() {
  try {
    const saved = localStorage.getItem('projectOverrides');
    projectOverrides = saved ? JSON.parse(saved) : {};
  } catch(e) { projectOverrides = {}; }
}

function saveProjectOverrides() { localStorage.setItem('projectOverrides', JSON.stringify(projectOverrides)); }

function getProjectKey(clientName, projectName) { return clientName + '||' + projectName; }

function getProjectRate(clientName, projectName) {
  const overrideKey = getProjectKey(clientName, projectName);
  if (projectOverrides[overrideKey] !== undefined) return projectOverrides[overrideKey];
  if (projectPriceSnapshots[overrideKey] !== undefined) return projectPriceSnapshots[overrideKey];
  const rate = futureClientRates[clientName] ?? getRate(clientName);
  projectPriceSnapshots[overrideKey] = rate;
  saveProjectSnapshots();
  return rate;
}

function setProjectRate(clientName, projectName, value) {
  const key = getProjectKey(clientName, projectName);
  projectOverrides[key] = value;
  saveProjectOverrides();
  renderAll();
}

function resetProjectRate(clientName, projectName) {
  const key = getProjectKey(clientName, projectName);
  delete projectOverrides[key];
  saveProjectOverrides();
}

function hasProjectOverride(clientName, projectName) {
  return projectOverrides[getProjectKey(clientName, projectName)] !== undefined;
}

// ═══════════════════════════════════════════════════════════════════════════
// SIDEBAR COLLAPSE (desktop)
// ═══════════════════════════════════════════════════════════════════════════
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const collapsed = sb.classList.toggle('collapsed');
  localStorage.setItem('sidebarCollapsed', collapsed ? 'true' : 'false');
}

function applySidebarState() {
  const saved = localStorage.getItem('sidebarCollapsed');
  if (saved === 'true') document.getElementById('sidebar').classList.add('collapsed');
}

// ═══════════════════════════════════════════════════════════════════════════
// NAMES
// ═══════════════════════════════════════════════════════════════════════════
const FULL_NAMES = { 'neil': 'Neil Pangilinan', 'aus': 'Austin Garcia' };
function getFullName(shortName) {
  const n = (shortName || '').toLowerCase().trim();
  return FULL_NAMES[n] || shortName || 'Unknown';
}

// ═══════════════════════════════════════════════════════════════════════════
// CLIENTS
// ═══════════════════════════════════════════════════════════════════════════
const CLIENTS = [
  { name:"LHF",          sheet:"1xU1qVfUaCwj5cVlvdY-SKnU4Cw2MqgV2mDA-OlgQgX0", gid:"0",          cols:{date:0,editor:1,project:2,frame:3,revised:5,status:6} },
  { name:"Boney",        sheet:"1xU1qVfUaCwj5cVlvdY-SKnU4Cw2MqgV2mDA-OlgQgX0", gid:"833188498",  cols:{date:0,editor:1,project:2,frame:4,revised:6,status:7} },
  { name:"L&S",          sheet:"1xU1qVfUaCwj5cVlvdY-SKnU4Cw2MqgV2mDA-OlgQgX0", gid:"317078901",  cols:{date:0,editor:1,project:2,frame:3,revised:5,status:6} },
  { name:"Jeya",         sheet:"1xU1qVfUaCwj5cVlvdY-SKnU4Cw2MqgV2mDA-OlgQgX0", gid:"1909088031", cols:{date:0,editor:1,project:2,frame:4,revised:6,status:7} },
  { name:"AM Market",    sheet:"1xU1qVfUaCwj5cVlvdY-SKnU4Cw2MqgV2mDA-OlgQgX0", gid:"1001571984", cols:{date:0,editor:1,project:2,frame:4,revised:6,status:7} },
  { name:"BullionFX",    sheet:"1xU1qVfUaCwj5cVlvdY-SKnU4Cw2MqgV2mDA-OlgQgX0", gid:"1467316596", cols:{date:0,editor:1,project:2,frame:4,revised:6,status:7} },
  { name:"Goreng Story", sheet:"1xU1qVfUaCwj5cVlvdY-SKnU4Cw2MqgV2mDA-OlgQgX0", gid:"210567726",  cols:{date:0,editor:1,project:2,frame:4,revised:6,status:7} }
];

let allData    = {};
let activeTab  = 'home';
let activeEditor = 'all';

// ═══════════════════════════════════════════════════════════════════════════
// STATUS
// ═══════════════════════════════════════════════════════════════════════════
function getWorkflowStatus(row) {
  const hasRevised = !!(row.revised && row.revised.trim());
  const hasFrame   = !!(row.frame   && row.frame.trim());
  const hasProject = !!(row.project && row.project.trim());
  if (!hasProject) return null;
  if (hasRevised)  return 'exported';
  if (hasFrame)    return 'checking';
  return 'pending';
}

function getPaymentStatus(row) {
  const st = (row.status || '').toLowerCase().trim();
  if (!st) return null;
  if (st.includes('paid') && !st.includes('not') && !st.includes('un')) return 'paid';
  if (st.includes('not paid') || st.includes('unpaid')) return 'unpaid';
  return null;
}

// ═══════════════════════════════════════════════════════════════════════════
// CSV
// ═══════════════════════════════════════════════════════════════════════════
function splitCSVLine(line) {
  const result = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQ = !inQ; }
    else if (ch === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += ch; }
  }
  result.push(cur);
  return result;
}

function parseCSV(text, clientDef) {
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  const { cols } = clientDef;
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const c       = splitCSVLine(lines[i]);
    const date    = (c[cols.date]    || '').trim();
    const editor  = (c[cols.editor]  || '').trim();
    const project = (c[cols.project] || '').trim();
    const frame   = (c[cols.frame]   || '').trim();
    const revised = (c[cols.revised] || '').trim();
    const status  = (c[cols.status]  || '').trim();
    if (editor.toLowerCase().includes('val')) continue;
    if (!date && !project) continue;
    rows.push({ date, editor, project, frame, revised, status });
  }
  return rows;
}

async function fetchSheet(sheetId, gid) {
  const url = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Could not fetch sheet gid=${gid}`);
  return res.text();
}

async function loadData() {
  const updatedEl = document.getElementById('last-updated');
  const mobUpdatedEl = document.getElementById('mob-last-updated');
  const mobDot = document.getElementById('mob-refresh-dot');

  if (updatedEl) updatedEl.textContent = 'Refreshing…';
  if (mobUpdatedEl) mobUpdatedEl.textContent = 'Refreshing…';
  if (mobDot) { mobDot.classList.remove('done'); mobDot.classList.add('active'); }

  try {
    allData = {};
    for (const client of CLIENTS) {
      const text = await fetchSheet(client.sheet, client.gid);
      const rows = parseCSV(text, client);
      if (rows.length) allData[client.name] = rows;
    }
    renderAll();
    const timeStr = 'Updated ' + new Date().toLocaleTimeString();
    if (updatedEl) updatedEl.textContent = timeStr;
    if (mobUpdatedEl) mobUpdatedEl.textContent = timeStr;
    if (mobDot) { mobDot.classList.remove('active'); mobDot.classList.add('done'); }
  } catch (e) {
    console.error('loadData error:', e);
    if (updatedEl) updatedEl.textContent = 'Refresh failed';
    if (mobUpdatedEl) mobUpdatedEl.textContent = 'Refresh failed';
    if (mobDot) { mobDot.classList.remove('active'); }
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// FILTERING & AGGREGATION
// ═══════════════════════════════════════════════════════════════════════════
function filterByEditor(rows) {
  if (!rows) return [];
  if (activeEditor === 'all') return rows;
  return rows.filter(r => r.editor.toLowerCase() === activeEditor.toLowerCase());
}

function computeClientStats(rows, clientName) {
  const f    = filterByEditor(rows);
  const tally = { paid:0, unpaid:0, exported:0, checking:0, pending:0 };
  let earnings = 0, pendingAmount = 0;
  for (const r of f) {
    const ws = getWorkflowStatus(r);
    const ps = getPaymentStatus(r);
    const rate = getProjectRate(clientName, r.project);
    if (ws) tally[ws]++;
    if (ps) tally[ps]++;
    if (ps === 'paid')   earnings      += rate;
    if (ps === 'unpaid') pendingAmount += rate;
  }
  return {
    total: f.filter(r => getWorkflowStatus(r) !== null).length,
    paid: tally.paid, unpaid: tally.unpaid,
    exported: tally.exported, checking: tally.checking, pending: tally.pending,
    earnings, pendingAmount,
  };
}

function computeGlobal() {
  const tally = { paid:0, unpaid:0, exported:0, checking:0, pending:0 };
  const editorMap = {};
  let total = 0;
  for (const [clientName, rows] of Object.entries(allData)) {
    for (const r of filterByEditor(rows)) {
      const ws   = getWorkflowStatus(r);
      const ps   = getPaymentStatus(r);
      const rate = getProjectRate(clientName, r.project);
      if (!ws) continue;
      total++;
      tally[ws]++;
      if (ps) tally[ps]++;
      const ed = r.editor || 'Unknown';
      if (!editorMap[ed]) editorMap[ed] = { paid:0, unpaid:0, exported:0, checking:0, pending:0, earnings:0 };
      editorMap[ed][ws]++;
      if (ps) editorMap[ed][ps]++;
      if (ps === 'paid') editorMap[ed].earnings += rate;
    }
  }
  return { total, ...tally, editorMap };
}

function getGlobalEarningsBreakdown() {
  let paidSum = 0, unpaidSum = 0;
  for (const [clientName, rows] of Object.entries(allData)) {
    for (const r of filterByEditor(rows)) {
      const ps   = getPaymentStatus(r);
      const rate = getProjectRate(clientName, r.project);
      if (ps === 'paid')   paidSum   += rate;
      if (ps === 'unpaid') unpaidSum += rate;
    }
  }
  return { paidSum, unpaidSum };
}

// ═══════════════════════════════════════════════════════════════════════════
// RENDER HELPERS (shared)
// ═══════════════════════════════════════════════════════════════════════════
function badgeHTML(status) {
  const map = {
    paid:     ['badge-paid',     '✓ Paid'],
    unpaid:   ['badge-unpaid',   '✕ Not Paid'],
    exported: ['badge-exported', '✓ Exported'],
    checking: ['badge-checking', '⏳ For Checking'],
    pending:  ['badge-pending',  '⏅ Pending'],
  };
  const [cls, label] = map[status] || ['badge-pending', status];
  return `<span class="badge ${cls}">${label}</span>`;
}

function fmt(n) { return '₱' + n.toLocaleString(); }

function getEditors() {
  const s = new Set();
  for (const rows of Object.values(allData)) {
    rows.forEach(r => {
      if (r.editor && r.editor.trim() && !r.editor.toLowerCase().includes('val'))
        s.add(r.editor);
    });
  }
  return [...s].sort();
}

function editorFilterHTML() {
  const editors = getEditors();
  const allActive = activeEditor === 'all' ? 'active' : '';
  const btns = editors.map(e => {
    const active = activeEditor === e ? 'active' : '';
    return `<button class="editor-btn ${active}" onclick="setEditor('${e}')">${e}</button>`;
  }).join('');
  return `<div class="editor-filter">
    <span class="filter-label">Editor:</span>
    <button class="editor-btn ${allActive}" onclick="setEditor('all')">All</button>
    ${btns}
  </div>`;
}

function editorTagHTML(editor) {
  const cls = editor.toLowerCase() === 'aus'  ? 'editor-aus'
            : editor.toLowerCase() === 'neil' ? 'editor-neil' : '';
  const fullName = getFullName(editor);
  return `<span class="editor-tag ${cls}" title="${fullName}">${editor || '–'}</span>`;
}

function videoColHTML(row) {
  const hasRevised = !!(row.revised && row.revised.trim());
  if (hasRevised) return `<span class="badge badge-exported">Exported</span>`;
  return `<span style="color:var(--muted)">—</span>`;
}

function amountCellHTML(paymentStatus, clientName, projectName) {
  if (paymentStatus !== 'paid' && paymentStatus !== 'unpaid') {
    return `<span style="color:var(--muted)">–</span>`;
  }
  const rate       = getProjectRate(clientName, projectName);
  const cls        = paymentStatus === 'paid' ? 'earned' : 'owed';
  const safeClient  = encodeURIComponent(clientName);
  const safeProject = encodeURIComponent(projectName);
  return `<span class="amount-cell"
      data-client="${safeClient}" data-project="${safeProject}"
      ondblclick="startInlineEdit(this)"
      title="Double-click to set a custom price for this project">
    <span class="amount ${cls}">${fmt(rate)}</span>
    <span class="edit-pencil">✎</span>
  </span>`;
}

function startInlineEdit(cell) {
  if (cell.querySelector('.amount-inline-input')) return;
  const clientName  = decodeURIComponent(cell.getAttribute('data-client'));
  const projectName = decodeURIComponent(cell.getAttribute('data-project'));
  const current     = getProjectRate(clientName, projectName);
  const amountSpan  = cell.querySelector('.amount');
  amountSpan.style.display = 'none';
  const pencil = cell.querySelector('.edit-pencil');
  if (pencil) pencil.style.display = 'none';
  const input = document.createElement('input');
  input.type  = 'number'; input.min = '0'; input.value = current;
  input.className = 'amount-inline-input';
  cell.insertBefore(input, amountSpan);
  input.focus(); input.select();
  let committed = false;
  function commit() {
    if (committed) return; committed = true;
    const val = parseInt(input.value, 10);
    if (!isNaN(val) && val >= 0) setProjectRate(clientName, projectName, val);
    else renderAll();
  }
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { committed = true; renderAll(); }
  });
  input.addEventListener('blur', commit);
}

function doResetProjectRate(safeClient, safeProject) {
  resetProjectRate(decodeURIComponent(safeClient), decodeURIComponent(safeProject));
  renderAll();
}

// ═══════════════════════════════════════════════════════════════════════════
// MOBILE DRAWER
// ═══════════════════════════════════════════════════════════════════════════
function mobOpenDrawer() {
  document.getElementById('mob-drawer').classList.add('open');
  document.getElementById('mob-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function mobCloseDrawer() {
  document.getElementById('mob-drawer').classList.remove('open');
  document.getElementById('mob-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function mobSwitchTab(tab) {
  mobCloseDrawer();
  switchTab(tab);
}

// ═══════════════════════════════════════════════════════════════════════════
// RENDER PIPELINE
// ═══════════════════════════════════════════════════════════════════════════
function setEditor(name) { activeEditor = name; renderAll(); }

function switchTab(tab) {
  activeTab = tab;
  renderAll();
  window.scrollTo(0, 0);
  const mobContent = document.getElementById('mob-content');
  if (mobContent) mobContent.scrollTop = 0;
}

function renderAll() {
  renderSidebar();
  renderMobileNav();
  if      (activeTab === 'home')             { renderHome(); renderMobileHome(); }
  else if (activeTab === 'pricing')          { renderPricing(); renderMobilePricing(); }
  else if (activeTab === 'summary-pending')  { renderSummaryPage('pending');  renderMobileSummary('pending'); }
  else if (activeTab === 'summary-checking') { renderSummaryPage('checking'); renderMobileSummary('checking'); }
  else if (activeTab === 'summary-unpaid')   { renderSummaryPage('unpaid');   renderMobileSummary('unpaid'); }
  else                                       { renderClient(activeTab); renderMobileClient(activeTab); }
}

// ── DESKTOP SIDEBAR ───────────────────────────────────────────────────────
function renderSidebar() {
  const nav    = document.getElementById('client-nav');
  const colors = ['#60a5fa','#f472b6','#34d399','#a78bfa','#fb923c','#e879f9','#f9a8d4'];
  document.getElementById('nav-home').className    = activeTab === 'home'    ? 'nav-item active' : 'nav-item';
  document.getElementById('nav-pricing').className = activeTab === 'pricing' ? 'nav-item active' : 'nav-item';
  nav.innerHTML = Object.keys(allData).map((c, i) => {
    const count  = filterByEditor(allData[c]).filter(r => getWorkflowStatus(r) !== null).length;
    const active = activeTab === c ? 'active' : '';
    return `<div class="nav-item ${active}" onclick="switchTab('${c}')">
      <div class="dot" style="background:${colors[i % colors.length]}"></div>
      <span class="nav-item-label">${c}</span>
      <span class="nav-count">${count}</span>
    </div>`;
  }).join('');
}

// ── MOBILE NAV ────────────────────────────────────────────────────────────
function renderMobileNav() {
  const nav    = document.getElementById('mob-client-nav');
  const colors = ['#60a5fa','#f472b6','#34d399','#a78bfa','#fb923c','#e879f9','#f9a8d4'];
  const homeEl    = document.getElementById('mob-nav-home');
  const pricingEl = document.getElementById('mob-nav-pricing');
  if (homeEl)    homeEl.className    = activeTab === 'home'    ? 'mob-nav-item active' : 'mob-nav-item';
  if (pricingEl) pricingEl.className = activeTab === 'pricing' ? 'mob-nav-item active' : 'mob-nav-item';

  nav.innerHTML = Object.keys(allData).map((c, i) => {
    const count  = filterByEditor(allData[c]).filter(r => getWorkflowStatus(r) !== null).length;
    const active = activeTab === c ? 'active' : '';
    return `<div class="mob-nav-item ${active}" onclick="mobSwitchTab('${c}')">
      <div class="mob-nav-dot" style="background:${colors[i % colors.length]}"></div>
      <span class="mob-nav-label">${c}</span>
      <span class="mob-nav-count">${count}</span>
    </div>`;
  }).join('');

  // Update top bar title
  const titleEl = document.getElementById('mob-page-title');
  if (titleEl) {
    const titleMap = {
      home: 'Dashboard',
      pricing: 'Pricing',
      'summary-pending': 'Pending',
      'summary-checking': 'For Checking',
      'summary-unpaid': 'Unpaid',
    };
    titleEl.textContent = titleMap[activeTab] || activeTab;
  }
}

// ── MOBILE EDITOR FILTER ──────────────────────────────────────────────────
function mobEditorFilterHTML() {
  const editors = getEditors();
  const allActive = activeEditor === 'all' ? 'active' : '';
  const btns = editors.map(e => {
    const active = activeEditor === e ? 'active' : '';
    return `<button class="mob-editor-btn ${active}" onclick="setEditor('${e}')">${e}</button>`;
  }).join('');
  return `<div class="mob-editor-filter">

    ${btns}
  </div>`;
}

// ── MOBILE BADGE ──────────────────────────────────────────────────────────
function mobBadgeHTML(status) {
  return badgeHTML(status); // reuse desktop badge HTML (same CSS classes work on mobile)
}

function mobEditorTagHTML(editor) {
  const cls = editor.toLowerCase() === 'aus'  ? 'editor-aus'

// ── MOBILE HOME ───────────────────────────────────────────────────────────
function renderMobileHome() {
  const cont = document.getElementById('mob-content');

  const fin  = getGlobalEarningsBreakdown();

  const editorCardsHTML = editors.map(ed => {
    const info = g.editorMap[ed] || {};

    const cls  = ed.toLowerCase() === 'aus' ? 'editor-aus' : ed.toLowerCase() === 'neil' ? 'editor-neil' : '';

    return `<div class="mob-editor-card">

  }).join('');

  cont.innerHTML = `
    <div>
      ${mobEditorFilterHTML()}

      <div class="mob-hero">
        <div class="mob-hero-eyebrow">Total Earnings · Paid Videos</div>
        <div class="mob-hero-amount">

function mobStartAmountEdit(btn, safeClient, safeProject) {
  const clientName  = decodeURIComponent(safeClient);
  const projectName = decodeURIComponent(safeProject);
  const current     = getProjectRate(clientName, projectName);
  const wrap        = btn.closest('.mob-pc-amount-wrap');
  if (!wrap || wrap.querySelector('.mob-amount-edit-input')) return;

  const amtSpan = wrap.querySelector('.mob-pc-amount');
  if (amtSpan) amtSpan.style.display = 'none';
  btn.style.display = 'none';

  const input = document.createElement('input');
  input.type = 'number'; input.min = '0'; input.value = current;
  input.className = 'mob-amount-edit-input';
  wrap.insertBefore(input, amtSpan);
  input.focus(); input.select();

  let committed = false;
  function commit() {
    if (committed) return; committed = true;
    const val = parseInt(input.value, 10);
    if (!isNaN(val) && val >= 0) setProjectRate(clientName, projectName, val);
    else renderAll();
  }
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { committed = true; renderAll(); }
  });
  input.addEventListener('blur', commit);
}

function onRateChange(input) {
  const client = input.getAttribute('data-client');
  const val    = parseInt(input.value, 10);
  if (!isNaN(val) && val >= 0) clientRates[client] = val;
}

function mobSavePricing() {
  for (const clientName of Object.keys(RATE_DEFAULTS)) {
    const id  = 'mob-rate-' + clientName.replace(/[^a-z0-9]/gi, '_');
    const inp = document.getElementById(id);
    if (!inp) continue;
    const val = parseInt(inp.value, 10);
    if (isNaN(val) || val < 0) continue;
    clientRates[clientName]       = val;
    futureClientRates[clientName] = val;
    Object.keys(projectPriceSnapshots).forEach(key => {
      if (key.startsWith(clientName + '||')) projectPriceSnapshots[key] = val;
    });
  }
  saveRates(); saveFutureRates(); saveProjectSnapshots();
  const msg = document.getElementById('mob-pricing-saved-msg');
  if (msg) {
    msg.textContent = '✓ All rates saved';
    msg.classList.add('show');
    setTimeout(() => { msg.textContent = ''; msg.classList.remove('show'); }, 2500);
  }
  renderAll();
}

function mobSaveFutureRates() {
  for (const clientName of Object.keys(RATE_DEFAULTS)) {
    const id  = 'mob-rate-' + clientName.replace(/[^a-z0-9]/gi, '_');
    const inp = document.getElementById(id);
    if (!inp) continue;
    const val = parseInt(inp.value, 10);
    if (!isNaN(val) && val >= 0) futureClientRates[clientName] = val;
  }
  saveFutureRates();
  const msg = document.getElementById('mob-pricing-saved-msg');
  if (msg) {
    msg.textContent = '✓ Future rates saved';
    msg.classList.add('show');
    setTimeout(() => { msg.textContent = ''; msg.classList.remove('show'); }, 2500);
  }
}

  document.getElementById('page-pricing').style.display = 'none';
  const el = document.getElementById('page-summary');
  el.style.display = '';

  const titleMap = { pending:'Pending Workspace', checking:'For Checking Summary', unpaid:'Unpaid Summary' };
  const isPaymentType = (type === 'unpaid');
  const matches = [];
  let aggregateOwedSum = 0;

  for (const [clientName, rows] of Object.entries(allData)) {
    for (const r of filterByEditor(rows)) {
      const match = isPaymentType
        ? getPaymentStatus(r) === 'unpaid'
        : getWorkflowStatus(r) === type;
      if (match) {
        matches.push({ client: clientName, r });
        if (isPaymentType) aggregateOwedSum += getProjectRate(clientName, r.project);
      }
    }
  }

  const unpaidTotalMarkup = isPaymentType
    ? `<div style="margin:0 40px 0;padding:16px 20px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:10px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:13px;color:var(--text2)">${matches.length} unpaid video${matches.length !== 1 ? 's' : ''} · Global Accumulation Owed</span>
        <span style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--red)">${fmt(aggregateOwedSum)}</span>
       </div>`
    : '';

  const tableRows = matches.map(({ client, r }) => {
    const ps = getPaymentStatus(r);
    return `<tr>
      <td><span style="font-weight:600;color:var(--gold)">${client}</span></td>
      <td><span style="color:var(--muted);font-size:12px">${r.date || '–'}</span></td>
      <td class="project-name">${r.project || '–'}</td>
      <td>${editorTagHTML(r.editor)}</td>
      <td>${badgeHTML(type)}</td>
      <td>${videoColHTML(r)}</td>
      ${isPaymentType ? `<td>${amountCellHTML(ps, client, r.project)}</td>` : ''}
    </tr>`;
  }).join('');

  const extraCol = isPaymentType ? '<th>Amount</th>' : '';
  const colSpan  = isPaymentType ? 7 : 6;

  el.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Global Aggregate</div>
        <div class="client-name"><span>${titleMap[type]}</span></div>
      </div>
      <div>${editorFilterHTML()}</div>
    </div>

    <div style="padding-top:28px">${unpaidTotalMarkup}</div>

    <div class="table-section" style="padding-top:20px">
      <div class="table-header">
        <span class="table-title">Matched Items</span>
        <span class="table-count">${matches.length} items</span>
      </div>
      <table>
        <thead>
          <tr><th>Client</th><th>Date</th><th>Project</th><th>Editor</th><th>Status</th><th>Video</th>${extraCol}</tr>
        </thead>
        <tbody>
          ${tableRows || `<tr><td colspan="${colSpan}" style="text-align:center;color:var(--muted);padding:48px">No items found for this status.</td></tr>`}
        </tbody>
      </table>
    </div>
  `;
}

// ── DESKTOP PRICING ───────────────────────────────────────────────────────
function renderPricing() {
  document.getElementById('page-home').style.display    = 'none';
  document.getElementById('page-client').style.display  = 'none';
  document.getElementById('page-summary').style.display = 'none';
  const el = document.getElementById('page-pricing');
  el.style.display = '';

  const cards = Object.keys(RATE_DEFAULTS).map(clientName => {
    const current = getRate(clientName);
    return `<div class="pricing-card">
      <div class="pricing-client">${clientName}</div>
      <div class="pricing-input-row">
        <span class="pricing-symbol">₱</span>
        <input
          class="pricing-input"
          type="number" min="0"
          id="rate-${clientName.replace(/[^a-z0-9]/gi,'_')}"
          value="${current}"
          data-client="${clientName}"
          onchange="onRateChange(this)"
        />
      </div>
      <div class="pricing-hint">per video · editable</div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Settings</div>
        <div class="client-name">PRICING <span>MANAGER</span></div>
      </div>
    </div>

    <div class="pricing-grid">${cards}</div>

    <div class="pricing-save-bar">
      <button class="pricing-save-btn" onclick="savePricingFromUI()">Save Rates</button>
      <button class="pricing-save-btn" onclick="saveFutureRatesOnly()">Save Future Rates</button>
      <span class="pricing-saved-msg" id="pricing-saved-msg">✓ Rates saved</span>
    </div>

    <div style="padding: 0 40px 40px">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;max-width:560px">
        <div style="font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:10px">How rates work</div>
        <div style="font-size:13px;color:var(--text2);line-height:1.7">
          Rates are saved to your browser and persist across refreshes. Every earnings total,
          dashboard card, and client page uses the rate stored here. Changing a rate and saving
          instantly recalculates everything on reload.
        </div>
      </div>
    </div>
  `;
}

function savePricingFromUI() {
  for (const clientName of Object.keys(RATE_DEFAULTS)) {
    const id  = 'rate-' + clientName.replace(/[^a-z0-9]/gi, '_');
    const inp = document.getElementById(id);
    if (!inp) continue;
    const val = parseInt(inp.value, 10);
    if (isNaN(val) || val < 0) continue;
    clientRates[clientName] = val;
    futureClientRates[clientName] = val;
    Object.keys(projectPriceSnapshots).forEach(key => {
      if (key.startsWith(clientName + '||')) projectPriceSnapshots[key] = val;
    });
  }
  saveRates(); saveFutureRates(); saveProjectSnapshots();
  const msg = document.getElementById('pricing-saved-msg');
  if (msg) { msg.textContent = '✓ Rates saved'; msg.classList.add('show'); setTimeout(() => msg.classList.remove('show'), 2500); }
  renderAll();
}

function saveFutureRatesOnly() {
  for (const clientName of Object.keys(RATE_DEFAULTS)) {
    const id  = 'rate-' + clientName.replace(/[^a-z0-9]/gi, '_');
    const inp = document.getElementById(id);
    if (!inp) continue;
    const val = parseInt(inp.value, 10);
    if (!isNaN(val) && val >= 0) futureClientRates[clientName] = val;
  }
  saveFutureRates();
  const msg = document.getElementById('pricing-saved-msg');
  if (msg) {
    msg.textContent = '✓ Future rates saved'; msg.classList.add('show');
    setTimeout(() => { msg.textContent = '✓ Rates saved'; msg.classList.remove('show'); }, 2500);
  }
}

function resetRates() {
  if (!confirm('Reset all rates to their original defaults?')) return;
  clientRates = { ...RATE_DEFAULTS };
  saveRates();
  renderPricing();
  renderSidebar();
}

// ═══════════════════════════════════════════════════════════════════════════
// COUNTER ANIMATIONS
// ═══════════════════════════════════════════════════════════════════════════
function countUp(id, target, duration) {
  const el = document.getElementById(id);
  if (!el) return;
  const start = performance.now();
  function step(now) {
    const p    = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.round(ease * target).toLocaleString();
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function mobCountUp(id, target, duration, currency = false) {
  const el = document.getElementById(id);
  if (!el) return;
  const start = performance.now();
  function step(now) {
    const p    = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    const val  = Math.round(ease * target);
    el.textContent = currency ? val.toLocaleString() : val.toLocaleString();
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ═══════════════════════════════════════════════════════════════════════════
loadRates();
loadFutureRates();
loadProjectOverrides();
loadProjectSnapshots();
applySidebarState();
loadData();
</script>
