<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VE — Earnings Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141418;
    --surface2: #1c1c22;
    --border: #2a2a32;
    --gold: #f5a623;
    --gold-dim: #c47d0e;
    --gold-glow: rgba(245,166,35,0.15);
    --green: #22c55e;
    --red: #ef4444;
    --blue: #60a5fa;
    --purple: #a78bfa;
    --amber: #fbbf24;
    --muted: #6b7280;
    --text: #e5e7eb;
    --text2: #9ca3af;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .app { display: flex; min-height: 100vh; }

  /* SIDEBAR */
  .sidebar {
    width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .sidebar-logo { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); }
  .sidebar-logo .suite { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--gold); }
  .sidebar-logo .sub { font-size: 10px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-top: 2px; }
  .sidebar-section { padding: 16px 12px 8px; font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
  .nav-item {
    margin: 2px 8px; padding: 10px 12px; border-radius: 8px; cursor: pointer;
    font-size: 13px; font-weight: 500; color: var(--text2);
    display: flex; align-items: center; gap: 10px;
    transition: all 0.15s; border: 1px solid transparent;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--gold-glow); color: var(--gold); border-color: rgba(245,166,35,0.25); }
  .nav-item .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .nav-count { margin-left: auto; font-size: 11px; background: var(--surface2); padding: 2px 6px; border-radius: 10px; color: var(--muted); }
  .nav-item.active .nav-count { background: rgba(245,166,35,0.2); color: var(--gold); }
  .sidebar-bottom { margin-top: auto; padding: 16px; border-top: 1px solid var(--border); }
  .refresh-btn {
    width: 100%; padding: 9px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text2); font-size: 12px; cursor: pointer;
    font-family: 'Inter', sans-serif; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .refresh-btn:hover { color: var(--gold); border-color: rgba(245,166,35,0.3); }
  .last-updated { font-size: 10px; color: var(--muted); text-align: center; margin-top: 8px; }

  /* MAIN */
  .main { flex: 1; overflow-y: auto; }

  /* HEADER */
  .page-header {
    padding: 32px 40px 0; display: flex; align-items: flex-start;
    justify-content: space-between; gap: 20px; flex-wrap: wrap;
  }
  .page-title { font-size: 13px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  .client-name { font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 2px; color: var(--text); line-height: 1; }
  .client-name span { color: var(--gold); }

  /* EDITOR FILTER */
  .editor-filter { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 8px; }
  .filter-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .editor-btn {
    padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--text2); font-size: 12px;
    font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.15s; font-weight: 500;
  }
  .editor-btn:hover { border-color: var(--gold); color: var(--gold); }
  .editor-btn.active { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 600; }

  /* STATS ROW */
  .stats-row { display: flex; gap: 16px; padding: 28px 40px 0; flex-wrap: wrap; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px 24px; flex: 1; min-width: 140px;
    position: relative; overflow: hidden;
  }
  .stat-card.earnings { border-color: rgba(245,166,35,0.35); }
  .stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 2px; background: var(--border); border-radius: 12px 12px 0 0;
  }
  .stat-card.earnings::before { background: linear-gradient(90deg, var(--gold), transparent); }
  .stat-card.paid::before { background: linear-gradient(90deg, var(--green), transparent); }
  .stat-card.unpaid::before { background: linear-gradient(90deg, var(--red), transparent); }
  .stat-card.total::before { background: linear-gradient(90deg, var(--blue), transparent); }
  .stat-card.editing::before { background: linear-gradient(90deg, var(--purple), transparent); }
  .stat-label { font-size: 11px; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 1px; line-height: 1; }
  .stat-card.earnings .stat-value { color: var(--gold); font-size: 44px; }
  .stat-card.paid .stat-value { color: var(--green); }
  .stat-card.unpaid .stat-value { color: var(--red); }
  .stat-card.total .stat-value { color: var(--blue); }
  .stat-card.editing .stat-value { color: var(--purple); }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 6px; }

  /* HERO */
  .hero { padding: 48px 40px 0; text-align: center; }
  .hero-eyebrow { font-size: 11px; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; margin-bottom: 16px; }
  .hero-earnings {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(80px, 15vw, 160px);
    letter-spacing: 4px; color: var(--gold); line-height: 1;
    transition: color 0.3s;
  }
  .hero-currency { font-size: 0.4em; vertical-align: top; margin-top: 0.18em; color: var(--gold-dim); }
  .hero-sub { font-size: 14px; color: var(--muted); margin-top: 12px; letter-spacing: 1px; }
  .hero-breakdown { display: flex; justify-content: center; gap: 40px; margin-top: 40px; flex-wrap: wrap; }
  .hero-stat { text-align: center; }
  .hero-stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--text); }
  .hero-stat-val.g { color: var(--green); }
  .hero-stat-val.r { color: var(--red); }
  .hero-stat-val.p { color: var(--purple); }
  .hero-stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 2px; }
  .hero-divider { width: 1px; background: var(--border); align-self: stretch; }
  .editor-earnings { display: flex; justify-content: center; gap: 24px; margin-top: 32px; flex-wrap: wrap; }
  .editor-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px 32px; text-align: center; min-width: 180px;
  }
  .editor-card-name { font-size: 12px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
  .editor-card-amt { font-family: 'Bebas Neue', sans-serif; font-size: 38px; color: var(--text); }
  .editor-card-amt .peso { font-size: 0.5em; color: var(--muted); vertical-align: top; margin-top: 0.2em; }

  /* STATUS LEGEND */
  .status-legend {
    display: flex; gap: 16px; flex-wrap: wrap;
    padding: 20px 40px 0; align-items: center;
  }
  .legend-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* TABLE */
  .table-section { padding: 28px 40px 40px; }
  .table-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .table-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 1.5px; }
  .table-count { font-size: 12px; color: var(--muted); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left; padding: 10px 14px; font-size: 10px; letter-spacing: 1.5px;
    color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--border); font-weight: 500;
  }
  td { padding: 12px 14px; border-bottom: 1px solid rgba(42,42,50,0.5); color: var(--text2); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); color: var(--text); }
  .project-name { color: var(--text); font-weight: 500; font-size: 13px; }

  /* BADGES */
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 20px; font-size: 11px;
    font-weight: 600; letter-spacing: 0.5px;
  }
  .badge-paid     { background: rgba(34,197,94,0.12);  color: #22c55e; border: 1px solid rgba(34,197,94,0.2); }
  .badge-unpaid   { background: rgba(239,68,68,0.12);  color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
  .badge-done     { background: rgba(96,165,250,0.12); color: #60a5fa; border: 1px solid rgba(96,165,250,0.2); }
  .badge-checking { background: rgba(251,191,36,0.12); color: #fbbf24; border: 1px solid rgba(251,191,36,0.2); }
  .badge-editing  { background: rgba(167,139,250,0.12);color: #a78bfa; border: 1px solid rgba(167,139,250,0.2); }

  .editor-tag { display: inline-block; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
  .editor-aus  { background: rgba(217,119,6,0.15);  color: #d97706; }
  .editor-neil { background: rgba(34,197,94,0.15);  color: #22c55e; }

  /* REVISED LINK */
  .revised-link {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--blue); text-decoration: none;
    border: 1px solid rgba(96,165,250,0.25); border-radius: 6px; padding: 2px 8px;
  }
  .revised-link:hover { background: rgba(96,165,250,0.1); }
  .revised-none { font-size: 11px; color: var(--muted); font-style: italic; }

  .amount { font-family: 'Bebas Neue', sans-serif; font-size: 15px; color: var(--text); letter-spacing: 0.5px; }
  .amount.earned { color: var(--green); }

  /* LOADING / ERROR */
  .state-msg { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; gap: 16px; color: var(--muted); }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes countup { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .animate-in { animation: countup 0.6s cubic-bezier(0.22,1,0.36,1) both; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 700px) {
    .sidebar { width: 60px; }
    .sidebar-logo .sub, .nav-item span, .sidebar-section, .nav-count { display: none; }
    .page-header, .stats-row, .table-section, .hero, .status-legend { padding-left: 20px; padding-right: 20px; }
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="suite">V<span style="color:var(--text2)">E</span></div>
      <div class="sub">Earnings Tracker</div>
    </div>
    <div class="sidebar-section">Overview</div>
    <div class="nav-item active" data-tab="home" onclick="switchTab('home')">
      <div class="dot" style="background:var(--gold)"></div>
      <span>Dashboard</span>
    </div>
    <div class="sidebar-section">Clients</div>
    <div id="client-nav"></div>
    <div class="sidebar-bottom">
      <button class="refresh-btn" onclick="loadData()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Refresh data
      </button>
      <div class="last-updated" id="last-updated">–</div>
    </div>
  </aside>

  <main class="main" id="main-content">
    <div id="page-home"></div>
    <div id="page-client" style="display:none"></div>
  </main>
</div>

<script>
const RATE_PER_VIDEO = 500;
let allData = {};
let activeTab = 'home';
let activeEditor = 'all';

const CLIENTS = [
  { name: "LHF",           sheet: "1xU1qVfUaCwj5cVlvdY-SKnU4Cw2MqgV2mDA-OlgQgX0", gid: "0" },
  { name: "Boney",         sheet: "1xU1qVfUaCwj5cVlvdY-SKnU4Cw2MqgV2mDA-OlgQgX0", gid: "833188498" },
  { name: "L&S",           sheet: "1xU1qVfUaCwj5cVlvdY-SKnU4Cw2MqgV2mDA-OlgQgX0", gid: "317078901" },
  { name: "Jeya",          sheet: "1xU1qVfUaCwj5cVlvdY-SKnU4Cw2MqgV2mDA-OlgQgX0", gid: "1909088031" },
  { name: "AM Market",     sheet: "1xU1qVfUaCwj5cVlvdY-SKnU4Cw2MqgV2mDA-OlgQgX0", gid: "1001571984" },
  { name: "BullionFX",     sheet: "1xU1qVfUaCwj5cVlvdY-SKnU4Cw2MqgV2mDA-OlgQgX0", gid: "1467316596" },
  { name: "Goreng Story",  sheet: "1xU1qVfUaCwj5cVlvdY-SKnU4Cw2MqgV2mDA-OlgQgX0", gid: "210567726" }
];

// ── STATUS LOGIC ───────────────────────────────────────────────────────────
function getProjectStatus(row, clientName) {
  const st = (row.status || '').toUpperCase();
  
  if (st.includes('PAID') && !st.includes('NOT')) return 'paid';
  if (st.includes('NOT PAID'))                     return 'unpaid';
  if (row.revised && row.revised.trim())           return 'done';
  
  // Custom case: BullionFX is complete if status is paid, even with no revised link
  if (clientName === "BullionFX" && st.includes('PAID')) return 'paid';
  
  if (row.exported && row.exported.trim())         return 'checking';
  return 'editing';
}

async function fetchSheet(sheetId, gid) {
  const url = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Could not fetch sheet.');
  const text = await res.text();
  return text;
}

// ── CUSTOM LAYOUT PARSING ──────────────────────────────────────────────────
function parseCSVForClient(text, clientName) {
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  const rows = [];
  
  const normName = clientName.toUpperCase();
  
  for (let i = 1; i < lines.length; i++) {
    const c = splitCSVLine(lines[i]);
    if (!c[0]?.trim() && !c[2]?.trim()) continue;
    
    let parsedRow = { date: '', editor: '', project: '', reference: '', frame: '', exported: '', revised: '', status: '' };
    
    if (normName === "LHF" || normName === "L&S") {
      // Layout: Date(0) | Editor(1) | Project(2) | Frame(3) | Export(4) | Revised(5) | Status(6)
      parsedRow.date     = c[0]?.trim() || '';
      parsedRow.editor   = c[1]?.trim() || '';
      parsedRow.project  = c[2]?.trim() || '';
      parsedRow.frame    = c[3]?.trim() || '';
      parsedRow.exported = c[4]?.trim() || '';
      parsedRow.revised  = c[5]?.trim() || '';
      parsedRow.status   = (c[6]?.trim() || '').toUpperCase();
    } else {
      // Standard Layout (Boney, Jeya, AM Market, BullionFX, Goreng Story):
      // Date(0) | Editor(1) | Project(2) | Reference(3) | Frame(4) | Export(5) | Revised(6) | Status(7)
      parsedRow.date     = c[0]?.trim() || '';
      parsedRow.editor   = c[1]?.trim() || '';
      parsedRow.project  = c[2]?.trim() || '';
      parsedRow.reference= c[3]?.trim() || '';
      parsedRow.frame    = c[4]?.trim() || '';
      parsedRow.exported = c[5]?.trim() || '';
      parsedRow.revised  = c[6]?.trim() || '';
      parsedRow.status   = (c[7]?.trim() || '').toUpperCase();
    }
    rows.push(parsedRow);
  }
  return rows;
}

function splitCSVLine(line) {
  const result = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQ = !inQ; }
    else if (ch === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += ch; }
  }
  result.push(cur);
  return result;
}

async function loadData() {
  try {
    allData = {};
    for (const client of CLIENTS) {
      const rawText = await fetchSheet(client.sheet, client.gid);
      const rows = parseCSVForClient(rawText, client.name);
      if (rows.length) {
        allData[client.name] = rows;
      }
    }
    renderAll();
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch(e) {
    console.warn('Refresh error:', e);
  }
}

function filterRows(rows) {
  if (!rows) return [];
  if (activeEditor === 'all') return rows;
  return rows.filter(r => r.editor.toLowerCase() === activeEditor.toLowerCase());
}

function computeStats(rows, clientName) {
  const f = filterRows(rows);
  let paid=0, unpaid=0, done=0, checking=0, editing=0;
  for (const r of f) {
    const s = getProjectStatus(r, clientName);
    if (s==='paid')     paid++;
    if (s==='unpaid')   unpaid++;
    if (s==='done')     done++;
    if (s==='checking') checking++;
    if (s==='editing')  editing++;
  }
  return { total:f.length, paid, unpaid, done, checking, editing,
    earnings: paid*RATE_PER_VIDEO, pending: unpaid*RATE_PER_VIDEO };
}

function computeGlobal() {
  let total=0, paid=0, unpaid=0, done=0, checking=0, editing=0;
  const editorMap = {};
  for (const [clientName, rows] of Object.entries(allData)) {
    const f = filterRows(rows);
    for (const r of f) {
      total++;
      const s = getProjectStatus(r, clientName);
      if (s==='paid')     paid++;
      if (s==='unpaid')   unpaid++;
      if (s==='done')     done++;
      if (s==='checking') checking++;
      if (s==='editing')  editing++;
      const ed = r.editor || 'Unknown';
      if (!editorMap[ed]) editorMap[ed] = { paid:0, unpaid:0, done:0, checking:0, editing:0 };
      editorMap[ed][s]++;
    }
  }
  return { total, paid, unpaid, done, checking, editing,
    earnings: paid*RATE_PER_VIDEO, pending: unpaid*RATE_PER_VIDEO, editorMap };
}

function badgeHTML(status) {
  const map = {
    paid:     ['badge-paid',     '✓ Paid'],
    unpaid:   ['badge-unpaid',   '✕ Not Paid'],
    done:     ['badge-done',     '✔ Delivered'],
    checking: ['badge-checking', '⏳ For Checking'],
    editing:  ['badge-editing',  '✏ Editing'],
  };
  const [cls, label] = map[status] || ['badge-editing', status];
  return `<span class="badge ${cls}">${label}</span>`;
}

function fmt(n) { return '₱' + n.toLocaleString(); }

function getEditors() {
  const s = new Set();
  for (const rows of Object.values(allData)) rows.forEach(r => r.editor && s.add(r.editor));
  return [...s].sort();
}

function editorFilterHTML() {
  const editors = getEditors();
  const btns = editors.map(e => {
    const active = activeEditor === e ? 'active' : '';
    return `<button class="editor-btn ${active}" onclick="setEditor('${e}')">${e}</button>`;
  }).join('');
  const allActive = activeEditor === 'all' ? 'active' : '';
  return `<div class="editor-filter">
    <span class="filter-label">Editor:</span>
    <button class="editor-btn ${allActive}" onclick="setEditor('all')">All</button>
    ${btns}
  </div>`;
}

function setEditor(name) { activeEditor = name; renderAll(); }

function renderAll() {
  renderSidebar();
  if (activeTab === 'home') renderHome();
  else renderClient(activeTab);
}

function renderSidebar() {
  const nav = document.getElementById('client-nav');
  const clients = Object.keys(allData);
  const colors = ['#60a5fa','#f472b6','#34d399','#a78bfa','#fb923c','#e879f9'];
  nav.innerHTML = clients.map((c, i) => {
    const rows = filterRows(allData[c]);
    const active = activeTab === c ? 'active' : '';
    return `<div class="nav-item ${active}" onclick="switchTab('${c}')">
      <div class="dot" style="background:${colors[i%colors.length]}"></div>
      <span>${c}</span>
      <span class="nav-count">${rows.length}</span>
    </div>`;
  }).join('');
}

function switchTab(tab) { activeTab = tab; renderAll(); window.scrollTo(0,0); }

function renderHome() {
  const g = computeGlobal();
  const editors = getEditors();
  document.getElementById('page-client').style.display = 'none';
  const el = document.getElementById('page-home');
  el.style.display = '';

  const editorCards = editors.map(ed => {
    if (activeEditor !== 'all' && activeEditor !== ed) return '';
    const info = g.editorMap[ed] || {};
    const edPaid = info.paid || 0;
    const inProgress = (info.editing||0) + (info.checking||0) + (info.done||0);
    return `<div class="editor-card">
      <div class="editor-card-name">${ed}</div>
      <div class="editor-card-amt"><span class="peso">₱</span>${(edPaid * RATE_PER_VIDEO).toLocaleString()}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px">${edPaid} paid · ${info.unpaid||0} unpaid · ${inProgress} in progress</div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Dashboard</div>
        <div class="client-name">ALL <span>CLIENTS</span></div>
      </div>
      <div>${editorFilterHTML()}</div>
    </div>

    <div class="hero animate-in">
      <div class="hero-eyebrow">Total Earnings (Paid Videos)</div>
      <div class="hero-earnings">
        <span class="hero-currency">₱</span><span id="count-num">0</span>
      </div>
      <div class="hero-sub">${g.paid} video${g.paid!==1?'s':''} paid · ₱${RATE_PER_VIDEO.toLocaleString()} per project</div>
      <div class="hero-breakdown">
        <div class="hero-stat">
          <div class="hero-stat-val g" id="count-paid">0</div>
          <div class="hero-stat-label">Paid</div>
        </div>
        <div class="hero-divider"></div>
        <div class="hero-stat">
          <div class="hero-stat-val r" id="count-unpaid">0</div>
          <div class="hero-stat-label">Not Paid</div>
        </div>
        <div class="hero-divider"></div>
        <div class="hero-stat">
          <div class="hero-stat-val" style="color:var(--blue)">${g.done}</div>
          <div class="hero-stat-label">Delivered</div>
        </div>
        <div class="hero-divider"></div>
        <div class="hero-stat">
          <div class="hero-stat-val" style="color:var(--amber)">${g.checking}</div>
          <div class="hero-stat-label">For Checking</div>
        </div>
        <div class="hero-divider"></div>
        <div class="hero-stat">
          <div class="hero-stat-val p">${g.editing}</div>
          <div class="hero-stat-label">Editing</div>
        </div>
        <div class="hero-divider"></div>
        <div class="hero-stat">
          <div class="hero-stat-val">${g.total}</div>
          <div class="hero-stat-label">Total</div>
        </div>
      </div>
      ${editorCards ? `<div class="editor-earnings" style="margin-top:36px">${editorCards}</div>` : ''}
    </div>

    <div class="status-legend">
      <span class="legend-label">Status key:</span>
      <span class="legend-item"><span class="legend-dot" style="background:#22c55e"></span>Paid — confirmed payment</span>
      <span class="legend-item"><span class="legend-dot" style="background:#ef4444"></span>Not Paid — done, awaiting payment</span>
      <span class="legend-item"><span class="legend-dot" style="background:#60a5fa"></span>Delivered — revised link attached</span>
      <span class="legend-item"><span class="legend-dot" style="background:#fbbf24"></span>For Checking — exported, no revised link yet</span>
      <span class="legend-item"><span class="legend-dot" style="background:#a78bfa"></span>Editing — still in production</span>
    </div>
  `;

  countUp('count-num', g.earnings, 1200);
  countUp('count-paid', g.paid, 900);
  countUp('count-unpaid', g.unpaid, 900);
}

function renderClient(clientName) {
  document.getElementById('page-home').style.display = 'none';
  const el = document.getElementById('page-client');
  el.style.display = '';
  const rows = allData[clientName] || [];
  const filtered = filterRows(rows);
  const s = computeStats(rows, clientName);

  const tableRows = filtered.map(r => {
    const ps = getProjectStatus(r, clientName);
    const isPaid = ps === 'paid';
    const edCls = r.editor.toLowerCase()==='aus' ? 'editor-aus' : r.editor.toLowerCase()==='neil' ? 'editor-neil' : '';
    const revisedCell = r.revised && r.revised.trim()
      ? `<a class="revised-link" href="${r.revised}" target="_blank">↗ View</a>`
      : `<span class="revised-none">Not revised yet</span>`;

    return `<tr>
      <td><span style="color:var(--muted);font-size:12px">${r.date||'–'}</span></td>
      <td class="project-name">${r.project||'–'}</td>
      <td><span class="editor-tag ${edCls}">${r.editor||'–'}</span></td>
      <td>${badgeHTML(ps)}</td>
      <td>${revisedCell}</td>
      <td><span class="amount ${isPaid?'earned':''}">${isPaid?fmt(RATE_PER_VIDEO):'–'}</span></td>
    </tr>`;
  }).join('');

  el.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Client</div>
        <div class="client-name"><span>${clientName}</span></div>
      </div>
      <div>${editorFilterHTML()}</div>
    </div>

    <div class="stats-row">
      <div class="stat-card earnings">
        <div class="stat-label">Earnings</div>
        <div class="stat-value">₱${s.earnings.toLocaleString()}</div>
        <div class="stat-sub">${s.paid} paid videos</div>
      </div>
      <div class="stat-card unpaid">
        <div class="stat-label">Pending Payment</div>
        <div class="stat-value">₱${s.pending.toLocaleString()}</div>
        <div class="stat-sub">${s.unpaid} not paid yet</div>
      </div>
      <div class="stat-card total">
        <div class="stat-label">Delivered</div>
        <div class="stat-value" style="color:var(--blue)">${s.done}</div>
        <div class="stat-sub">Revised link attached</div>
      </div>
      <div class="stat-card editing">
        <div class="stat-label">In Progress</div>
        <div class="stat-value">${s.editing + s.checking}</div>
        <div class="stat-sub">${s.checking} for checking, ${s.editing} editing</div>
      </div>
    </div>

    <div class="status-legend">
      <span class="legend-label">Status key:</span>
      <span class="legend-item"><span class="legend-dot" style="background:#22c55e"></span>Paid</span>
      <span class="legend-item"><span class="legend-dot" style="background:#ef4444"></span>Not Paid (done, awaiting payment)</span>
      <span class="legend-item"><span class="legend-dot" style="background:#60a5fa"></span>Delivered (revised link attached)</span>
      <span class="legend-item"><span class="legend-dot" style="background:#fbbf24"></span>For Checking (exported, no revised link)</span>
      <span class="legend-item"><span class="legend-dot" style="background:#a78bfa"></span>Editing</span>
    </div>

    <div class="table-section">
      <div class="table-header">
        <span class="table-title">Project Log</span>
        <span class="table-count">${filtered.length} entries</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Date</th><th>Project</th><th>Editor</th><th>Status</th><th>Revised File</th><th>Amount</th>
          </tr>
        </thead>
        <tbody>${tableRows||'<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:32px">No projects found</td></tr>'}</tbody>
      </table>
    </div>
  `;
}

function countUp(id, target, duration) {
  const el = document.getElementById(id);
  if (!el) return;
  const start = performance.now();
  function step(now) {
    const p = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.round(ease * target).toLocaleString();
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// INIT
loadData();
</script>
